server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/disciplica}
    username: ${DATABASE_USERNAME:disciplica}
    password: ${DATABASE_PASSWORD:disciplica}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

disciplica:
  jwt:
    issuer: ${JWT_ISSUER:disciplica}
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:30}
  google:
    client-id: ${GOOGLE_CLIENT_ID:494569734074-0guigvh4mtdt5so1ue27l5l8jqi5sghf.apps.googleusercontent.com}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    public-base-url: ${PUBLIC_BASE_URL:http://localhost:8080}
